version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: finflow-postgres
    environment:
      POSTGRES_DB: finflow_users
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: